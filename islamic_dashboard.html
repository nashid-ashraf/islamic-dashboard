<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Islamic Dashboard – Prototype</title>
<style>
  :root{--green:#1e7e5a;--dark:#0f1b2d;--card:#172033;--accent:#3ecf8e;--text:#e2e8f0;--muted:#94a3b8;--red:#e74c3c;--gold:#f5c542;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;padding:16px;}
  h1{text-align:center;color:var(--accent);font-size:1.5rem;margin-bottom:4px;}
  .sub{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:20px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px;}
  .card{background:var(--card);border-radius:12px;padding:18px;border:1px solid #1e3050;}
  .card h2{font-size:.95rem;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  /* Prayer */
  .prayer-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #1e3050;}
  .prayer-row:last-child{border-bottom:none;}
  .prayer-name{font-size:.9rem;}
  .prayer-time{font-size:.95rem;font-weight:600;color:var(--gold);}
  .prayer-row.active{background:#162a1f;border-radius:6px;padding:7px 8px;}
  /* Quran */
  #quranArabic{font-size:1.3rem;direction:rtl;text-align:right;line-height:2;color:var(--gold);margin-bottom:8px;}
  #quranEng{font-size:.85rem;color:var(--muted);font-style:italic;line-height:1.6;}
  .surah-nav{display:flex;gap:8px;margin-top:10px;}
  .surah-nav button{flex:1;padding:6px;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;}
  .btn-prev{background:#1e3050;color:var(--text);}
  .btn-next{background:var(--green);color:#fff;}
  /* Reminders */
  #reminderForm{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  #reminderForm input,#reminderForm select{padding:8px 10px;border-radius:6px;border:1px solid #1e3050;background:#0f1b2d;color:var(--text);font-size:.85rem;}
  #reminderForm button{padding:8px;background:var(--green);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;}
  .reminder-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e3050;}
  .reminder-item:last-child{border-bottom:none;}
  .reminder-cb{width:18px;height:18px;cursor:pointer;accent-color:var(--accent);}
  .reminder-info{flex:1;}
  .reminder-title{font-size:.88rem;}
  .reminder-title.done{text-decoration:line-through;color:var(--muted);}
  .reminder-time{font-size:.75rem;color:var(--muted);}
  .del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:1rem;}
  /* Location */
  .loc-bar{display:flex;gap:8px;margin-bottom:18px;}
  .loc-bar input{flex:1;padding:8px 10px;border-radius:6px;border:1px solid #1e3050;background:var(--card);color:var(--text);font-size:.85rem;}
  .loc-bar button{padding:8px 14px;background:var(--green);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:.85rem;}
  .status{text-align:center;color:var(--muted);font-size:.78rem;margin-bottom:10px;}
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.72rem;margin-left:6px;}
  .badge-next{background:#1e3050;color:var(--gold);}
</style>
</head>
<body>

<h1>🕌 Islamic Daily Dashboard</h1>
<p class="sub" id="hijriDate">Loading Hijri date…</p>

<div class="loc-bar">
  <input id="cityInput" placeholder="City (e.g. Dhaka)" value="Dhaka"/>
  <input id="countryInput" placeholder="Country (e.g. Bangladesh)" value="Bangladesh"/>
  <select id="methodSelect" style="padding:8px;border-radius:6px;border:1px solid #1e3050;background:#172033;color:#e2e8f0;font-size:.82rem;">
    <option value="1">University of Islamic Sciences, Karachi</option>
    <option value="2">ISNA (North America)</option>
    <option value="3">Muslim World League</option>
    <option value="4">Umm Al-Qura, Makkah</option>
    <option value="5" selected>Egyptian General Authority</option>
    <option value="8">Gulf Region</option>
    <option value="15">Diyanet (Turkey)</option>
  </select>
  <button onclick="loadAll()">🔄 Load</button>
</div>
<p class="status" id="statusMsg">Press Load to fetch prayer times & Quran.</p>

<div class="grid">

  <!-- PRAYER TIMES -->
  <div class="card">
    <h2>🕐 Prayer Times</h2>
    <div id="prayerList"><p style="color:var(--muted);font-size:.85rem;">Not loaded yet.</p></div>
  </div>

  <!-- QURAN -->
  <div class="card">
    <h2>📖 Quran – <span id="surahLabel">Surah 1</span></h2>
    <div id="quranArabic">Loading…</div>
    <div id="quranEng"></div>
    <div id="ayahCounter" style="font-size:.75rem;color:var(--muted);margin-top:6px;"></div>
    <div class="surah-nav">
      <button class="btn-prev" onclick="changeSurah(-1)">◀ Prev Surah</button>
      <button class="btn-next" onclick="changeSurah(1)">Next Surah ▶</button>
    </div>
  </div>

  <!-- CUSTOM REMINDERS -->
  <div class="card">
    <h2>🔔 Custom Reminders</h2>
    <div id="reminderForm">
      <input id="rTitle" placeholder="Activity (e.g. Recite Ayat al-Kursi)"/>
      <input id="rTime" type="datetime-local"/>
      <select id="rRepeat">
        <option value="none">No repeat</option>
        <option value="daily">Daily</option>
        <option value="weekly">Weekly</option>
      </select>
      <button onclick="addReminder()">➕ Add Reminder</button>
    </div>
    <div id="reminderList"><p style="color:var(--muted);font-size:.85rem;">No reminders yet.</p></div>
  </div>

</div>

<script>
const PRAYERS = ['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'];
let currentSurah = 1;
let surahAyahs = [];
let currentAyah = 0;
let reminders = JSON.parse(localStorage.getItem('islamicReminders') || '[]');

// ── Helpers ────────────────────────────────────────────────────────────────
function setStatus(msg){ document.getElementById('statusMsg').textContent = msg; }
function padZ(n){ return String(n).padStart(2,'0'); }
function toMinutes(t){ const [h,m] = t.split(':').map(Number); return h*60+m; }
function nowMinutes(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }

// ── Load All ────────────────────────────────────────────────────────────────
async function loadAll(){
  const city    = document.getElementById('cityInput').value.trim() || 'Dhaka';
  const country = document.getElementById('countryInput').value.trim() || 'Bangladesh';
  const method  = document.getElementById('methodSelect').value;
  setStatus('Fetching prayer times…');
  try{
    await Promise.all([loadPrayers(city, country, method), loadQuran(currentSurah)]);
    setStatus(`Loaded for ${city}, ${country} · Method ${method}`);
  } catch(e){ setStatus('Error: ' + e.message); }
  renderReminders();
  requestNotifPermission();
}

// ── Prayer Times ────────────────────────────────────────────────────────────
async function loadPrayers(city, country, method){
  const url = `https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=${encodeURIComponent(country)}&method=${method}`;
  const res  = await fetch(url);
  const json = await res.json();
  if(json.code !== 200) throw new Error(json.data || 'Prayer API error');
  const t = json.data.timings;
  const h = json.data.date.hijri;
  document.getElementById('hijriDate').textContent =
    `${h.weekday.en} · ${h.day} ${h.month.en} ${h.year} AH`;
  renderPrayers(t);
  schedulePrayerNotifs(t);
}

function renderPrayers(timings){
  const nm = nowMinutes();
  let nextIdx = -1;
  const pList = PRAYERS.filter(p => timings[p]);
  // find next upcoming prayer
  for(let i=0;i<pList.length;i++){
    if(toMinutes(timings[pList[i]]) > nm){ nextIdx = i; break; }
  }
  const html = pList.map((p,i) => {
    const isNext = i === nextIdx;
    return `<div class="prayer-row${isNext?' active':''}">
      <span class="prayer-name">${p}${isNext?'<span class="badge badge-next">Next</span>':''}</span>
      <span class="prayer-time">${timings[p]}</span>
    </div>`;
  }).join('');
  document.getElementById('prayerList').innerHTML = html;
}

// ── Quran ───────────────────────────────────────────────────────────────────
async function loadQuran(surah){
  const [arRes, enRes] = await Promise.all([
    fetch(`https://api.alquran.cloud/v1/surah/${surah}`),
    fetch(`https://api.alquran.cloud/v1/surah/${surah}/en.sahih`)
  ]);
  const arJson = await arRes.json();
  const enJson = await enRes.json();
  surahAyahs = arJson.data.ayahs.map((a,i) => ({
    ar: a.text,
    en: enJson.data.ayahs[i].text,
    n:  a.numberInSurah
  }));
  document.getElementById('surahLabel').textContent =
    `${arJson.data.englishName} (${arJson.data.name}) · ${arJson.data.numberOfAyahs} Ayahs`;
  currentAyah = 0;
  renderAyah();
}

function renderAyah(){
  if(!surahAyahs.length) return;
  const a = surahAyahs[currentAyah];
  document.getElementById('quranArabic').textContent = a.ar;
  document.getElementById('quranEng').textContent    = a.en;
  document.getElementById('ayahCounter').textContent =
    `Ayah ${a.n} of ${surahAyahs.length}  |  ◀▶ Use buttons below`;
}

function changeSurah(dir){
  currentSurah = Math.max(1, Math.min(114, currentSurah + dir));
  loadQuran(currentSurah);
}

// ── Custom Reminders ────────────────────────────────────────────────────────
function addReminder(){
  const title  = document.getElementById('rTitle').value.trim();
  const time   = document.getElementById('rTime').value;
  const repeat = document.getElementById('rRepeat').value;
  if(!title){ alert('Please enter a title.'); return; }
  const r = { id: Date.now(), title, dueTime: time ? new Date(time).getTime() : null, repeat, complete: false };
  reminders.push(r);
  saveReminders();
  renderReminders();
  if(r.dueTime) scheduleLocalNotif(r);
  document.getElementById('rTitle').value = '';
  document.getElementById('rTime').value  = '';
}

function toggleReminder(id){
  const r = reminders.find(x=>x.id===id);
  if(r){ r.complete = !r.complete; saveReminders(); renderReminders(); }
}

function deleteReminder(id){
  reminders = reminders.filter(x=>x.id!==id);
  saveReminders(); renderReminders();
}

function saveReminders(){ localStorage.setItem('islamicReminders', JSON.stringify(reminders)); }

function renderReminders(){
  if(!reminders.length){
    document.getElementById('reminderList').innerHTML = '<p style="color:var(--muted);font-size:.85rem;">No reminders yet.</p>';
    return;
  }
  document.getElementById('reminderList').innerHTML = reminders.map(r => {
    const dt = r.dueTime ? new Date(r.dueTime).toLocaleString() : 'No time set';
    const rpt= r.repeat !== 'none' ? ` · 🔁 ${r.repeat}` : '';
    return `<div class="reminder-item">
      <input class="reminder-cb" type="checkbox" ${r.complete?'checked':''} onchange="toggleReminder(${r.id})"/>
      <div class="reminder-info">
        <div class="reminder-title${r.complete?' done':''}">${r.title}</div>
        <div class="reminder-time">${dt}${rpt}</div>
      </div>
      <button class="del-btn" onclick="deleteReminder(${r.id})" title="Delete">🗑</button>
    </div>`;
  }).join('');
}

// ── Notifications ───────────────────────────────────────────────────────────
async function requestNotifPermission(){
  if('Notification' in window && Notification.permission==='default')
    await Notification.requestPermission();
}

function scheduleLocalNotif(r){
  const delay = r.dueTime - Date.now();
  if(delay <= 0) return;
  setTimeout(()=>{
    if(Notification.permission==='granted')
      new Notification('🔔 ' + r.title, {body:'Time for your activity!', tag: 'custom-'+r.id});
  }, delay);
}

function schedulePrayerNotifs(timings){
  if(Notification.permission !== 'granted') return;
  const now = new Date();
  PRAYERS.forEach(p => {
    if(!timings[p]) return;
    const [h,m] = timings[p].split(':').map(Number);
    const t = new Date(now); t.setHours(h,m,0,0);
    const delay = t - now;
    if(delay > 0){
      setTimeout(()=>{
        new Notification(`🕌 Time for ${p}`, {body: timings[p], tag: 'prayer-'+p});
      }, delay);
    }
  });
}

// ── Init ────────────────────────────────────────────────────────────────────
renderReminders();
loadAll();
</script>
</body>
</html>
